services:
  frontend:
    build: ./frontend-qph
    container_name: frontend_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend-qph
    container_name: backend_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products_db
    ports:
      - "5433:5432"
    volumes:
      - ./backend-qph/product_db.sql:/docker-entrypoint-initdb.d/product_db.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]

volumes:
  postgres_data:
