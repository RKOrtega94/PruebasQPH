<div class="users-page">
  <p-toast/>
  <p-confirmDialog/>

  <div class="page-header">
    <div class="header-left">
      <div class="header-icon">
        <i class="pi pi-users"></i>
      </div>
      <div class="header-text">
        <h1>Usuarios</h1>
        <p>{{ users.length }} usuario{{ users.length !== 1 ? 's' : '' }}
          registrado{{ users.length !== 1 ? 's' : '' }}</p>
      </div>
    </div>
    <div class="header-actions">
      <p-button
        label="Nuevo Usuario"
        icon="pi pi-plus"
        styleClass="new-btn"
        (onClick)="goToCreate()"
      />
    </div>
  </div>

  <div class="table-card">
    <p-table
      [value]="users"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20]"
      styleClass="p-datatable-sm"
      [tableStyle]="{ 'min-width': '40rem' }"
      [rowHover]="true"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id" style="width: 80px">ID
            <p-sortIcon field="id"/>
          </th>
          <th pSortableColumn="username">Usuario
            <p-sortIcon field="username"/>
          </th>
          <th pSortableColumn="active">Estado
            <p-sortIcon field="active"/>
          </th>
          <th style="width: 120px; text-align: center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td><span class="id-badge">#{{ user.id }}</span></td>
          <td>
            <div class="user-name">
              <i class="pi pi-user"></i>
              {{ user.username }}
            </div>
          </td>
          <td>
            <p-tag
              [value]="user.active ? 'Activo' : 'Inactivo'"
              [severity]="user.active ? 'success' : 'danger'"
            />
          </td>
          <td>
            <div class="action-buttons">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="info"
                pTooltip="Editar"
                (onClick)="goToEdit(user.id)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                pTooltip="Eliminar"
                (onClick)="confirmDelete(user)"
              />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <i class="pi pi-inbox"></i>
              <span>No hay usuarios registrados</span>
              <p-button
                label="Crear primer usuario"
                icon="pi pi-plus"
                [text]="true"
                (onClick)="goToCreate()"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
